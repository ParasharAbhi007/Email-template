pipeline:
  name: newpipeline
  identifier: newpipeline
  projectIdentifier: CSETest1
  orgIdentifier: AbhiOrg
  tags:
    test: test
  stages:
    - stage:
        name: one
        identifier: one
        description: ""
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: ShellScript_1
                  identifier: ShellScript_1
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          echo <+secrets.getValue("servicenow")>
                          echo "hello"
                          echo <+secrets.getValue('<+<+pipeline.variables.hh>now.toLowerCase()>')>
                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
        tags: {}
  variables:
    - name: hh
      type: String
      description: ""
      required: false
      value: service
