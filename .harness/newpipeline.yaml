pipeline:
  name: newpipeline
  identifier: newpipeline
  projectIdentifier: CSETest1
  orgIdentifier: AbhiOrg
  tags:
    test: test
  stages:
    - stage:
        name: one
        identifier: one
        description: ""
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: ShellScript_1
                  identifier: ShellScript_1
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          echo "hello"
                          echo <+pipeline.executionUrl>
                          echo <+secrets.getValue("account.SA_Token)>
                    environmentVariables: []
                    outputVariables:
                      - name: ARTIFACTORY_USERNAME
                        type: Secret
                        value: ARTIFACTORY_USERNAME
                  timeout: 10m
                  when:
                    stageStatus: Success
              - step:
                  type: HarnessApproval
                  name: HarnessApproval_1
                  identifier: HarnessApproval_1
                  spec:
                    approvalMessage: Please review the following information and approve the pipeline progression
                    includePipelineExecutionHistory: true
                    isAutoRejectEnabled: false
                    approvers:
                      userGroups:
                        - account._account_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
                  timeout: 1d
        tags: {}
  variables:
    - name: hh
      type: String
      description: ""
      required: false
      value: <+input>
