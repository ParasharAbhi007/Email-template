pipeline:
  name: newpipeline
  identifier: newpipeline
  projectIdentifier: CSETest1
  orgIdentifier: AbhiOrg
  tags:
    test: test
  stages:
    - stage:
        name: custome
        identifier: custome
        description: ""
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: ShellScript_1
                  identifier: ShellScript_1
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: "echo customIamRolePoliciesNames: <+expression.isResolved(<+pipeline.variables.iamRole>)?[]:<+expression.isResolved(<+pipeline.variables.customIamRolePolicyNames>)?<+pipeline.variables.customIamRolePolicyNames>:[]>>"
                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
        tags: {}
        when:
          pipelineStatus: Success
          condition: ("<+pipeline.variables.hh>"== "true" && ("<+pipeline.variables.iamRole>"=="one") )|| "<+pipeline.variables.customIamRolePolicyNames>"== "two"
    - stage:
        name: depl
        identifier: depl
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          environment:
            environmentRef: ECS_INFRA
            environmentInputs:
              variables:
                - name: dbname
                  type: String
                  value: <+input>
            deployToAll: false
            infrastructureDefinitions:
              - identifier: two
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: ShellScript_1
                  identifier: ShellScript_1
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: echo <+strategy.identifierPostFix>
                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
            rollbackSteps: []
          services:
            values:
              - serviceRef: K8new
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: <+input>
                          sources: <+input>
              - serviceRef: k8service
            metadata:
              parallel: false
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
  variables:
    - name: hh
      type: String
      description: ""
      required: false
      value: "true"
    - name: iamRole
      type: String
      description: ""
      required: false
      value: one
    - name: customIamRolePolicyNames
      type: String
      description: ""
      required: false
      value: two
  notificationRules:
    - name: dff
      identifier: dff
      pipelineEvents:
        - type: PipelineStart
      notificationMethod:
        type: Webhook
        spec:
          webhookUrl: <+variables.notification-hh>
      enabled: true
  allowStageExecutions: true
